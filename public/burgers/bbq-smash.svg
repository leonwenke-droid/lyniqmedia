<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF4D2"/>
      <stop offset="100%" stop-color="#FFE08A"/>
    </radialGradient>
    <linearGradient id="bunTop3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4B86A"/>
      <stop offset="100%" stop-color="#D88A3C"/>
    </linearGradient>
    <linearGradient id="bunBot3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E89B4A"/>
      <stop offset="100%" stop-color="#B86A2A"/>
    </linearGradient>
    <linearGradient id="patty3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B2E12"/>
      <stop offset="100%" stop-color="#3F1A09"/>
    </linearGradient>
    <linearGradient id="bbq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B2D14"/>
      <stop offset="100%" stop-color="#5A1A08"/>
    </linearGradient>
    <linearGradient id="bacon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C44834"/>
      <stop offset="50%" stop-color="#F8DEB6"/>
      <stop offset="100%" stop-color="#A8341E"/>
    </linearGradient>
  </defs>

  <rect width="600" height="600" fill="url(#bg3)"/>
  <g opacity="0.3">
    <rect x="0" y="500" width="100" height="100" fill="#0a1530"/>
    <rect x="200" y="500" width="100" height="100" fill="#0a1530"/>
    <rect x="400" y="500" width="100" height="100" fill="#0a1530"/>
    <rect x="100" y="540" width="100" height="60" fill="#0a1530"/>
    <rect x="300" y="540" width="100" height="60" fill="#0a1530"/>
    <rect x="500" y="540" width="100" height="60" fill="#0a1530"/>
  </g>
  <ellipse cx="300" cy="495" rx="220" ry="22" fill="#000" opacity="0.18"/>
  <ellipse cx="300" cy="480" rx="225" ry="32" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="3"/>

  <g transform="translate(300 320)">
    <!-- Bottom bun -->
    <path d="M -150 130 Q -150 170 -100 175 Q -50 180 0 180 Q 50 180 100 175 Q 150 170 150 130 L 145 110 L -145 110 Z" fill="url(#bunBot3)" stroke="#1a1a1a" stroke-width="3.5"/>

    <!-- Onion rings stack -->
    <g>
      <ellipse cx="-60" cy="100" rx="42" ry="14" fill="#E8B566" stroke="#1a1a1a" stroke-width="2.5"/>
      <ellipse cx="-60" cy="100" rx="22" ry="6" fill="url(#bg3)" stroke="#1a1a1a" stroke-width="2"/>
      <!-- breading texture -->
      <circle cx="-85" cy="98" r="2" fill="#C68B3B"/>
      <circle cx="-40" cy="105" r="2" fill="#C68B3B"/>
      <circle cx="-70" cy="92" r="1.5" fill="#C68B3B"/>

      <ellipse cx="55" cy="103" rx="38" ry="12" fill="#E8B566" stroke="#1a1a1a" stroke-width="2.5"/>
      <ellipse cx="55" cy="103" rx="20" ry="5" fill="url(#bg3)" stroke="#1a1a1a" stroke-width="2"/>
      <circle cx="35" cy="100" r="2" fill="#C68B3B"/>
      <circle cx="75" cy="106" r="2" fill="#C68B3B"/>
    </g>

    <!-- Bacon strips -->
    <path d="M -120 60 Q -100 55 -80 62 Q -60 70 -40 60 Q -20 52 0 60 Q 20 68 40 58 Q 60 50 80 60 Q 100 70 120 62 L 120 78 Q 100 85 80 75 Q 60 65 40 75 Q 20 85 0 75 Q -20 67 -40 75 Q -60 85 -80 78 Q -100 70 -120 78 Z" fill="url(#bacon)" stroke="#1a1a1a" stroke-width="2.5"/>

    <!-- Patty -->
    <path d="M -148 22 Q -148 4 -130 2 Q -100 -3 -60 -1 Q 0 -6 60 -1 Q 100 -3 130 2 Q 148 4 148 22 Q 148 39 130 44 Q 100 49 60 46 Q 0 52 -60 46 Q -100 49 -130 44 Q -148 39 -148 22 Z" fill="url(#patty3)" stroke="#1a1a1a" stroke-width="3"/>

    <!-- BBQ sauce drip -->
    <path d="M -150 -8 L 150 -8 L 145 22 Q 100 35 60 32 Q 0 38 -60 32 Q -100 35 -145 22 Z" fill="url(#bbq)" stroke="#1a1a1a" stroke-width="3"/>
    <!-- Drips -->
    <path d="M -125 18 L -130 50 L -120 45 Z" fill="url(#bbq)" stroke="#1a1a1a" stroke-width="2.5"/>
    <path d="M -30 25 L -35 55 L -25 50 Z" fill="url(#bbq)" stroke="#1a1a1a" stroke-width="2.5"/>
    <path d="M 80 25 L 85 55 L 75 50 Z" fill="url(#bbq)" stroke="#1a1a1a" stroke-width="2.5"/>
    <path d="M 130 18 L 135 48 L 125 43 Z" fill="url(#bbq)" stroke="#1a1a1a" stroke-width="2.5"/>

    <!-- Top bun -->
    <path d="M -145 -10 Q -145 -110 0 -115 Q 145 -110 145 -10 Z" fill="url(#bunTop3)" stroke="#1a1a1a" stroke-width="3.5"/>
    <path d="M -120 -90 Q -100 -105 -60 -110 Q 0 -113 60 -110 Q 100 -105 120 -90" fill="none" stroke="#FFE0B0" stroke-width="3" opacity="0.7"/>
    <g fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5">
      <ellipse cx="-70" cy="-80" rx="5" ry="3" transform="rotate(-15 -70 -80)"/>
      <ellipse cx="-30" cy="-95" rx="5" ry="3" transform="rotate(10 -30 -95)"/>
      <ellipse cx="20" cy="-100" rx="5" ry="3" transform="rotate(-5 20 -100)"/>
      <ellipse cx="60" cy="-90" rx="5" ry="3" transform="rotate(20 60 -90)"/>
      <ellipse cx="-95" cy="-50" rx="5" ry="3" transform="rotate(-30 -95 -50)"/>
      <ellipse cx="90" cy="-55" rx="5" ry="3" transform="rotate(30 90 -55)"/>
      <ellipse cx="-15" cy="-60" rx="5" ry="3" transform="rotate(15 -15 -60)"/>
    </g>
  </g>

  <!-- Smoke wisps -->
  <path d="M 100 80 Q 110 60 100 40 Q 90 20 100 0" fill="none" stroke="#FAFAF6" stroke-width="3" opacity="0.5"/>
  <path d="M 130 100 Q 140 80 130 60 Q 120 40 130 20" fill="none" stroke="#FAFAF6" stroke-width="3" opacity="0.4"/>
  <!-- BBQ sauce splatter -->
  <circle cx="510" cy="100" r="8" fill="#5A1A08" opacity="0.7"/>
  <circle cx="540" cy="130" r="5" fill="#5A1A08" opacity="0.6"/>
  <circle cx="525" cy="160" r="6" fill="#5A1A08" opacity="0.7"/>
</svg>
