<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE6F0"/>
      <stop offset="100%" stop-color="#F8B8D5"/>
    </radialGradient>
    <linearGradient id="croissant" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5C078"/>
      <stop offset="50%" stop-color="#D89540"/>
      <stop offset="100%" stop-color="#A56B20"/>
    </linearGradient>
    <linearGradient id="croissantBot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D89540"/>
      <stop offset="100%" stop-color="#8E5418"/>
    </linearGradient>
    <linearGradient id="patty4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B2E12"/>
      <stop offset="100%" stop-color="#3F1A09"/>
    </linearGradient>
    <linearGradient id="cheese4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE15D"/>
      <stop offset="100%" stop-color="#F2B61E"/>
    </linearGradient>
  </defs>

  <rect width="600" height="600" fill="url(#bg4)"/>
  <g opacity="0.25">
    <rect x="0" y="510" width="80" height="90" fill="#FF2D87"/>
    <rect x="160" y="510" width="80" height="90" fill="#FF2D87"/>
    <rect x="320" y="510" width="80" height="90" fill="#FF2D87"/>
    <rect x="480" y="510" width="80" height="90" fill="#FF2D87"/>
    <rect x="80" y="555" width="80" height="45" fill="#FF2D87"/>
    <rect x="240" y="555" width="80" height="45" fill="#FF2D87"/>
    <rect x="400" y="555" width="80" height="45" fill="#FF2D87"/>
  </g>
  <ellipse cx="300" cy="495" rx="220" ry="22" fill="#000" opacity="0.18"/>
  <ellipse cx="300" cy="480" rx="225" ry="32" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="3"/>

  <g transform="translate(300 320)">
    <!-- Bottom croissant - flaky/layered look -->
    <path d="M -160 130 Q -160 175 -110 178 Q -55 182 0 182 Q 55 182 110 178 Q 160 175 160 130 L 155 110 L -155 110 Z" fill="url(#croissantBot)" stroke="#1a1a1a" stroke-width="3.5"/>
    <!-- Croissant flake lines bottom -->
    <path d="M -130 140 Q -100 145 -70 142" fill="none" stroke="#7A4818" stroke-width="2" opacity="0.6"/>
    <path d="M -50 150 Q -20 155 10 152" fill="none" stroke="#7A4818" stroke-width="2" opacity="0.6"/>
    <path d="M 30 148 Q 60 153 90 150" fill="none" stroke="#7A4818" stroke-width="2" opacity="0.6"/>
    <path d="M 100 142 Q 130 147 150 144" fill="none" stroke="#7A4818" stroke-width="2" opacity="0.6"/>

    <!-- Lettuce -->
    <path d="M -150 110 Q -130 90 -110 105 Q -90 80 -70 100 Q -50 78 -30 100 Q -10 75 10 100 Q 30 78 50 100 Q 70 80 90 105 Q 110 88 130 105 Q 145 90 150 110 L 150 118 L -150 118 Z" fill="#5BC474" stroke="#1a1a1a" stroke-width="3"/>

    <!-- Patty 1 -->
    <path d="M -148 78 Q -148 60 -130 58 Q -100 53 -60 55 Q 0 50 60 55 Q 100 53 130 58 Q 148 60 148 78 Q 148 95 130 100 Q 100 105 60 102 Q 0 108 -60 102 Q -100 105 -130 100 Q -148 95 -148 78 Z" fill="url(#patty4)" stroke="#1a1a1a" stroke-width="3"/>

    <!-- Cheese -->
    <path d="M -155 50 L 155 50 L 145 78 Q 100 88 60 86 Q 0 92 -60 86 Q -100 88 -145 78 Z" fill="url(#cheese4)" stroke="#1a1a1a" stroke-width="3"/>
    <path d="M -130 75 L -135 100 L -125 95 Z" fill="url(#cheese4)" stroke="#1a1a1a" stroke-width="2.5"/>
    <path d="M 110 75 L 115 100 L 105 95 Z" fill="url(#cheese4)" stroke="#1a1a1a" stroke-width="2.5"/>

    <!-- Patty 2 -->
    <path d="M -148 22 Q -148 4 -130 2 Q -100 -3 -60 -1 Q 0 -6 60 -1 Q 100 -3 130 2 Q 148 4 148 22 Q 148 39 130 44 Q 100 49 60 46 Q 0 52 -60 46 Q -100 49 -130 44 Q -148 39 -148 22 Z" fill="url(#patty4)" stroke="#1a1a1a" stroke-width="3"/>

    <!-- Cheese 2 -->
    <path d="M -155 -8 L 155 -8 L 145 20 Q 100 30 60 28 Q 0 34 -60 28 Q -100 30 -145 20 Z" fill="url(#cheese4)" stroke="#1a1a1a" stroke-width="3"/>

    <!-- Top croissant - distinctive shape with horns -->
    <path d="M -160 -10 Q -180 -40 -150 -70 Q -120 -95 -80 -100 Q -40 -115 0 -115 Q 40 -115 80 -100 Q 120 -95 150 -70 Q 180 -40 160 -10 Z" fill="url(#croissant)" stroke="#1a1a1a" stroke-width="3.5"/>

    <!-- Croissant layered/spiral lines -->
    <path d="M -140 -50 Q -100 -70 -50 -85" fill="none" stroke="#7A4818" stroke-width="2.5" opacity="0.7"/>
    <path d="M -120 -30 Q -80 -55 -30 -75" fill="none" stroke="#7A4818" stroke-width="2.5" opacity="0.7"/>
    <path d="M -100 -10 Q -60 -40 -10 -65" fill="none" stroke="#7A4818" stroke-width="2.5" opacity="0.7"/>
    <path d="M 140 -50 Q 100 -70 50 -85" fill="none" stroke="#7A4818" stroke-width="2.5" opacity="0.7"/>
    <path d="M 120 -30 Q 80 -55 30 -75" fill="none" stroke="#7A4818" stroke-width="2.5" opacity="0.7"/>
    <path d="M 100 -10 Q 60 -40 10 -65" fill="none" stroke="#7A4818" stroke-width="2.5" opacity="0.7"/>
    <path d="M -10 -110 Q -5 -90 -10 -50" fill="none" stroke="#7A4818" stroke-width="2.5" opacity="0.7"/>
    <path d="M 10 -110 Q 5 -90 10 -50" fill="none" stroke="#7A4818" stroke-width="2.5" opacity="0.7"/>

    <!-- highlight -->
    <path d="M -120 -70 Q -80 -90 -40 -100" fill="none" stroke="#FFE0B0" stroke-width="3" opacity="0.6"/>
    <path d="M 40 -100 Q 80 -90 120 -70" fill="none" stroke="#FFE0B0" stroke-width="3" opacity="0.6"/>
  </g>

  <!-- Sparkles -->
  <g fill="#FAFAF6">
    <polygon points="80,80 84,72 88,80 96,84 88,88 84,96 80,88 72,84"/>
    <polygon points="520,140 522,136 524,140 528,142 524,144 522,148 520,144 516,142"/>
    <polygon points="540,90 542,86 544,90 548,92 544,94 542,98 540,94 536,92"/>
  </g>
</svg>
