<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="cup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAF6"/>
      <stop offset="100%" stop-color="#D8D8D0"/>
    </linearGradient>
    <linearGradient id="shake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5C2E12"/>
      <stop offset="100%" stop-color="#3F1A09"/>
    </linearGradient>
    <linearGradient id="cream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0E6D6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="#C8F2F1"/>
  <!-- straw -->
  <rect x="220" y="40" width="16" height="160" fill="#FF2D87" stroke="#1a1a1a" stroke-width="2.5" transform="rotate(8 228 120)"/>
  <rect x="222" y="42" width="3" height="155" fill="#FAFAF6" opacity="0.5" transform="rotate(8 228 120)"/>

  <!-- whipped cream swirl -->
  <path d="M 100 180 Q 100 130 150 130 Q 200 110 250 130 Q 300 130 300 180 Q 280 170 260 175 Q 230 160 200 175 Q 170 160 140 175 Q 120 170 100 180 Z" fill="url(#cream)" stroke="#1a1a1a" stroke-width="3"/>
  <!-- cherry -->
  <circle cx="200" cy="115" r="14" fill="#E63946" stroke="#1a1a1a" stroke-width="2.5"/>
  <circle cx="195" cy="110" r="3" fill="#FAFAF6" opacity="0.7"/>
  <path d="M 200 102 Q 215 90 220 75" fill="none" stroke="#3FA15A" stroke-width="3"/>

  <!-- cup -->
  <path d="M 110 180 L 290 180 L 270 360 Q 200 380 130 360 Z" fill="url(#cup)" stroke="#1a1a1a" stroke-width="3"/>
  <!-- shake liquid visible through (chocolate) -->
  <path d="M 130 200 L 270 200 L 252 340 Q 200 355 148 340 Z" fill="url(#shake)"/>
  <!-- chocolate drip on top -->
  <path d="M 120 195 Q 130 220 140 195 Q 160 230 180 195 Q 210 235 230 195 Q 250 220 260 195 Q 270 180 280 195 L 280 215 L 120 215 Z" fill="url(#shake)" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- BS logo band -->
  <rect x="100" y="270" width="200" height="40" fill="#FF2D87" stroke="#1a1a1a" stroke-width="2.5"/>
  <text x="200" y="298" font-family="'Bebas Neue', sans-serif" font-size="22" fill="#FAFAF6" text-anchor="middle" letter-spacing="4">BURGER STATION</text>

  <!-- bubbles -->
  <circle cx="80" cy="100" r="6" fill="#FF2D87" opacity="0.6"/>
  <circle cx="320" cy="80" r="8" fill="#FAFAF6" opacity="0.7"/>
  <circle cx="340" cy="140" r="5" fill="#FF2D87" opacity="0.6"/>
</svg>
