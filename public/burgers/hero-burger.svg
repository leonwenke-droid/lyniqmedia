<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none">
  <defs>
    <radialGradient id="heroBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFD7E5"/>
      <stop offset="60%" stop-color="#F8B8D5"/>
      <stop offset="100%" stop-color="#D88AB5"/>
    </radialGradient>
    <linearGradient id="hbT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8C885"/>
      <stop offset="100%" stop-color="#D88A3C"/>
    </linearGradient>
    <linearGradient id="hbB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E89B4A"/>
      <stop offset="100%" stop-color="#A05818"/>
    </linearGradient>
    <linearGradient id="hpat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A3B1F"/>
      <stop offset="100%" stop-color="#3F1A09"/>
    </linearGradient>
    <linearGradient id="hch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE15D"/>
      <stop offset="100%" stop-color="#F2B61E"/>
    </linearGradient>
    <radialGradient id="lightSpot" cx="50%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" in="SourceAlpha"/>
      <feOffset dx="0" dy="20"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="800" fill="url(#heroBg)"/>
  <rect width="800" height="800" fill="url(#lightSpot)"/>

  <!-- Decorative checkerboard floor -->
  <g opacity="0.18">
    <rect x="0" y="650" width="100" height="150" fill="#1a1a1a"/>
    <rect x="200" y="650" width="100" height="150" fill="#1a1a1a"/>
    <rect x="400" y="650" width="100" height="150" fill="#1a1a1a"/>
    <rect x="600" y="650" width="100" height="150" fill="#1a1a1a"/>
    <rect x="100" y="720" width="100" height="80" fill="#1a1a1a"/>
    <rect x="300" y="720" width="100" height="80" fill="#1a1a1a"/>
    <rect x="500" y="720" width="100" height="80" fill="#1a1a1a"/>
    <rect x="700" y="720" width="100" height="80" fill="#1a1a1a"/>
  </g>

  <!-- Background neon arcs -->
  <g opacity="0.5">
    <circle cx="150" cy="150" r="60" fill="none" stroke="#FF2D87" stroke-width="4"/>
    <circle cx="650" cy="200" r="40" fill="none" stroke="#00E0E0" stroke-width="4"/>
    <circle cx="700" cy="120" r="14" fill="#FF2D87"/>
    <circle cx="100" cy="80" r="10" fill="#00E0E0"/>
  </g>

  <!-- Plate shadow -->
  <ellipse cx="400" cy="660" rx="320" ry="35" fill="#000" opacity="0.25"/>
  <!-- Plate -->
  <ellipse cx="400" cy="640" rx="320" ry="48" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="4"/>
  <ellipse cx="400" cy="640" rx="300" ry="40" fill="none" stroke="#E0E0D8" stroke-width="2"/>

  <g transform="translate(400 440)" filter="url(#dropShadow)">
    <!-- Bottom bun -->
    <path d="M -200 170 Q -200 220 -130 226 Q -60 232 0 232 Q 60 232 130 226 Q 200 220 200 170 L 195 145 L -195 145 Z" fill="url(#hbB)" stroke="#1a1a1a" stroke-width="4"/>

    <!-- Lettuce -->
    <path d="M -200 145 Q -180 120 -160 138 Q -140 110 -120 132 Q -100 108 -80 130 Q -60 105 -40 130 Q -20 105 0 130 Q 20 105 40 130 Q 60 105 80 130 Q 100 108 120 132 Q 140 110 160 138 Q 180 120 200 145 L 200 156 L -200 156 Z" fill="#5BC474" stroke="#1a1a1a" stroke-width="3.5"/>
    <path d="M -200 145 Q -180 120 -160 138 Q -140 110 -120 132 Q -100 108 -80 130 Q -60 105 -40 130 Q -20 105 0 130 Q 20 105 40 130 Q 60 105 80 130 Q 100 108 120 132 Q 140 110 160 138 Q 180 120 200 145" fill="none" stroke="#3FA15A" stroke-width="2.5" opacity="0.7"/>

    <!-- Tomato slice -->
    <path d="M -180 100 Q -180 80 -160 78 Q -100 72 -50 75 Q 0 70 50 75 Q 100 72 160 78 Q 180 80 180 100 Q 180 118 160 122 Q 100 128 50 124 Q 0 130 -50 124 Q -100 128 -160 122 Q -180 118 -180 100 Z" fill="#E63946" stroke="#1a1a1a" stroke-width="3"/>
    <circle cx="-100" cy="100" r="3" fill="#FFD93D"/>
    <circle cx="-50" cy="105" r="3" fill="#FFD93D"/>
    <circle cx="20" cy="100" r="3" fill="#FFD93D"/>
    <circle cx="80" cy="105" r="3" fill="#FFD93D"/>

    <!-- Patty 2 -->
    <path d="M -198 70 Q -198 50 -180 48 Q -130 42 -65 45 Q 0 40 65 45 Q 130 42 180 48 Q 198 50 198 70 Q 198 88 180 92 Q 130 98 65 95 Q 0 102 -65 95 Q -130 98 -180 92 Q -198 88 -198 70 Z" fill="url(#hpat)" stroke="#1a1a1a" stroke-width="3.5"/>

    <!-- Cheese -->
    <path d="M -205 38 L 205 38 L 195 70 Q 130 82 65 80 Q 0 88 -65 80 Q -130 82 -195 70 Z" fill="url(#hch)" stroke="#1a1a1a" stroke-width="3.5"/>
    <!-- Cheese drips -->
    <path d="M -160 65 L -168 105 L -152 100 Z" fill="url(#hch)" stroke="#1a1a1a" stroke-width="3"/>
    <path d="M -60 70 L -68 115 L -52 110 Z" fill="url(#hch)" stroke="#1a1a1a" stroke-width="3"/>
    <path d="M 70 70 L 78 115 L 62 110 Z" fill="url(#hch)" stroke="#1a1a1a" stroke-width="3"/>
    <path d="M 150 65 L 158 100 L 142 95 Z" fill="url(#hch)" stroke="#1a1a1a" stroke-width="3"/>

    <!-- Patty 1 -->
    <path d="M -195 12 Q -195 -8 -175 -10 Q -120 -16 -60 -14 Q 0 -20 60 -14 Q 120 -16 175 -10 Q 195 -8 195 12 Q 195 32 175 36 Q 120 42 60 38 Q 0 46 -60 38 Q -120 42 -175 36 Q -195 32 -195 12 Z" fill="url(#hpat)" stroke="#1a1a1a" stroke-width="3.5"/>

    <!-- Bacon -->
    <path d="M -180 -25 Q -150 -32 -120 -22 Q -90 -12 -60 -25 Q -30 -35 0 -22 Q 30 -12 60 -25 Q 90 -35 120 -22 Q 150 -12 180 -25 L 180 -8 Q 150 4 120 -8 Q 90 -22 60 -8 Q 30 4 0 -8 Q -30 -22 -60 -8 Q -90 4 -120 -8 Q -150 -22 -180 -8 Z" fill="#C44834" stroke="#1a1a1a" stroke-width="3"/>
    <path d="M -170 -22 Q -140 -28 -110 -20" fill="none" stroke="#F8DEB6" stroke-width="3"/>
    <path d="M -50 -22 Q -20 -28 10 -20" fill="none" stroke="#F8DEB6" stroke-width="3"/>
    <path d="M 70 -22 Q 100 -28 130 -20" fill="none" stroke="#F8DEB6" stroke-width="3"/>

    <!-- Top bun -->
    <path d="M -195 -38 Q -195 -160 0 -168 Q 195 -160 195 -38 Z" fill="url(#hbT)" stroke="#1a1a1a" stroke-width="4"/>
    <!-- Bun highlight -->
    <path d="M -160 -130 Q -100 -158 0 -163 Q 100 -158 160 -130" fill="none" stroke="#FFE0B0" stroke-width="4" opacity="0.8"/>
    <!-- Sesame -->
    <g fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2">
      <ellipse cx="-110" cy="-115" rx="7" ry="4" transform="rotate(-15 -110 -115)"/>
      <ellipse cx="-50" cy="-140" rx="7" ry="4" transform="rotate(10 -50 -140)"/>
      <ellipse cx="20" cy="-150" rx="7" ry="4" transform="rotate(-5 20 -150)"/>
      <ellipse cx="80" cy="-138" rx="7" ry="4" transform="rotate(20 80 -138)"/>
      <ellipse cx="130" cy="-115" rx="7" ry="4" transform="rotate(-15 130 -115)"/>
      <ellipse cx="-140" cy="-75" rx="7" ry="4" transform="rotate(-30 -140 -75)"/>
      <ellipse cx="135" cy="-75" rx="7" ry="4" transform="rotate(30 135 -75)"/>
      <ellipse cx="-30" cy="-90" rx="7" ry="4" transform="rotate(15 -30 -90)"/>
      <ellipse cx="55" cy="-95" rx="7" ry="4" transform="rotate(-15 55 -95)"/>
      <ellipse cx="-80" cy="-60" rx="7" ry="4" transform="rotate(-20 -80 -60)"/>
      <ellipse cx="90" cy="-55" rx="7" ry="4" transform="rotate(25 90 -55)"/>
    </g>
  </g>

  <!-- Sparkles overlay -->
  <g fill="#FAFAF6">
    <polygon points="120,300 124,290 128,300 138,304 128,308 124,318 120,308 110,304"/>
    <polygon points="680,400 684,390 688,400 698,404 688,408 684,418 680,408 670,404"/>
    <polygon points="700,560 702,556 704,560 708,562 704,564 702,568 700,564 696,562"/>
  </g>
</svg>
