<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD7E5"/>
      <stop offset="100%" stop-color="#FFB6D9"/>
    </radialGradient>
    <linearGradient id="bunTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4B86A"/>
      <stop offset="100%" stop-color="#D88A3C"/>
    </linearGradient>
    <linearGradient id="bunBot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E89B4A"/>
      <stop offset="100%" stop-color="#B86A2A"/>
    </linearGradient>
    <linearGradient id="patty" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B2E12"/>
      <stop offset="100%" stop-color="#3F1A09"/>
    </linearGradient>
    <linearGradient id="cheese" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE15D"/>
      <stop offset="100%" stop-color="#F2B61E"/>
    </linearGradient>
    <radialGradient id="plate" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E8E0"/>
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="600" height="600" fill="url(#bg1)"/>
  <!-- Checkerboard floor -->
  <g opacity="0.3">
    <rect x="0" y="500" width="100" height="100" fill="#FF2D87"/>
    <rect x="200" y="500" width="100" height="100" fill="#FF2D87"/>
    <rect x="400" y="500" width="100" height="100" fill="#FF2D87"/>
    <rect x="100" y="540" width="100" height="60" fill="#FF2D87"/>
    <rect x="300" y="540" width="100" height="60" fill="#FF2D87"/>
    <rect x="500" y="540" width="100" height="60" fill="#FF2D87"/>
  </g>
  <!-- Plate shadow -->
  <ellipse cx="300" cy="490" rx="220" ry="22" fill="#000" opacity="0.18" filter="url(#shadow)"/>
  <!-- Plate -->
  <ellipse cx="300" cy="475" rx="225" ry="32" fill="url(#plate)" stroke="#1a1a1a" stroke-width="3"/>

  <g transform="translate(300 320)">
    <!-- Bottom bun -->
    <path d="M -150 130 Q -150 170 -100 175 Q -50 180 0 180 Q 50 180 100 175 Q 150 170 150 130 L 145 110 L -145 110 Z" fill="url(#bunBot)" stroke="#1a1a1a" stroke-width="3.5"/>

    <!-- Lettuce wave -->
    <path d="M -150 110 Q -130 90 -110 105 Q -90 80 -70 100 Q -50 78 -30 100 Q -10 75 10 100 Q 30 78 50 100 Q 70 80 90 105 Q 110 88 130 105 Q 145 90 150 110 L 150 118 L -150 118 Z" fill="#5BC474" stroke="#1a1a1a" stroke-width="3"/>
    <path d="M -150 110 Q -130 90 -110 105 Q -90 80 -70 100 Q -50 78 -30 100 Q -10 75 10 100 Q 30 78 50 100 Q 70 80 90 105 Q 110 88 130 105 Q 145 90 150 110" fill="none" stroke="#3FA15A" stroke-width="2"/>

    <!-- Patty 2 -->
    <path d="M -148 78 Q -148 60 -130 58 Q -100 53 -60 55 Q 0 50 60 55 Q 100 53 130 58 Q 148 60 148 78 Q 148 95 130 100 Q 100 105 60 102 Q 0 108 -60 102 Q -100 105 -130 100 Q -148 95 -148 78 Z" fill="url(#patty)" stroke="#1a1a1a" stroke-width="3"/>
    <!-- Drips -->
    <path d="M -100 95 Q -95 110 -90 95" fill="#3F1A09"/>
    <path d="M 80 95 Q 85 112 90 95" fill="#3F1A09"/>

    <!-- Cheese -->
    <path d="M -155 50 L 155 50 L 145 78 Q 100 88 60 86 Q 0 92 -60 86 Q -100 88 -145 78 Z" fill="url(#cheese)" stroke="#1a1a1a" stroke-width="3"/>
    <!-- Cheese drip -->
    <path d="M -120 75 L -125 95 L -115 90 Z" fill="url(#cheese)" stroke="#1a1a1a" stroke-width="2.5"/>
    <path d="M 110 75 L 115 95 L 105 90 Z" fill="url(#cheese)" stroke="#1a1a1a" stroke-width="2.5"/>

    <!-- Patty 1 -->
    <path d="M -148 22 Q -148 4 -130 2 Q -100 -3 -60 -1 Q 0 -6 60 -1 Q 100 -3 130 2 Q 148 4 148 22 Q 148 39 130 44 Q 100 49 60 46 Q 0 52 -60 46 Q -100 49 -130 44 Q -148 39 -148 22 Z" fill="url(#patty)" stroke="#1a1a1a" stroke-width="3"/>

    <!-- Cheese 2 -->
    <path d="M -155 -8 L 155 -8 L 145 20 Q 100 30 60 28 Q 0 34 -60 28 Q -100 30 -145 20 Z" fill="url(#cheese)" stroke="#1a1a1a" stroke-width="3"/>

    <!-- Top bun -->
    <path d="M -145 -10 Q -145 -110 0 -115 Q 145 -110 145 -10 Z" fill="url(#bunTop)" stroke="#1a1a1a" stroke-width="3.5"/>
    <!-- Bun highlight -->
    <path d="M -120 -90 Q -100 -105 -60 -110 Q 0 -113 60 -110 Q 100 -105 120 -90" fill="none" stroke="#FFE0B0" stroke-width="3" opacity="0.7"/>
    <!-- Sesame -->
    <ellipse cx="-70" cy="-80" rx="5" ry="3" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(-15 -70 -80)"/>
    <ellipse cx="-30" cy="-95" rx="5" ry="3" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(10 -30 -95)"/>
    <ellipse cx="20" cy="-100" rx="5" ry="3" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(-5 20 -100)"/>
    <ellipse cx="60" cy="-90" rx="5" ry="3" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(20 60 -90)"/>
    <ellipse cx="-95" cy="-50" rx="5" ry="3" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(-30 -95 -50)"/>
    <ellipse cx="90" cy="-55" rx="5" ry="3" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(30 90 -55)"/>
    <ellipse cx="-15" cy="-60" rx="5" ry="3" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(15 -15 -60)"/>
    <ellipse cx="40" cy="-65" rx="5" ry="3" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(-15 40 -65)"/>
  </g>

  <!-- Decorative neon rings -->
  <circle cx="80" cy="100" r="20" fill="none" stroke="#FF2D87" stroke-width="3" opacity="0.6"/>
  <circle cx="520" cy="80" r="14" fill="#00E0E0" opacity="0.7"/>
  <circle cx="540" cy="160" r="8" fill="#FF2D87" opacity="0.7"/>
</svg>
